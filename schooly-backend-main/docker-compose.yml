version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: schooly-postgres
    environment:
      POSTGRES_USER: schooly_user
      POSTGRES_PASSWORD: schooly_password
      POSTGRES_DB: schooly_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - schooly-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U schooly_user"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  schooly-network:
    driver: bridge
