spring.application.name=school-erp-backend
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://ep-snowy-king-aopqgrht-pooler.c-2.ap-southeast-1.aws.neon.tech/neondb?sslmode=require&channelBinding=require}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:neondb_owner}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:npg_rowJC37Isvuj}

#spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.flyway.enabled=true
logging.level.org.flywaydb=DEBUG
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=240000
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.connection-timeout=30000
server.port=${PORT:8080}
server.address=0.0.0.0
app.jwt.secret=${APP_JWT_SECRET:change-me-change-me-change-me-change-me-change-me}
app.jwt.access-token-expiration-ms=${APP_JWT_ACCESS_TOKEN_EXPIRATION_MS:86400000}
app.jwt.refresh-token-expiration-ms=${APP_JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}
